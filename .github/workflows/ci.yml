name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate plugin + marketplace manifests
        run: python3 scripts/validate_manifests.py

      - name: Validate commands (frontmatter + help/README in sync)
        run: python3 scripts/validate_commands.py

      - name: Validate example wikilinks
        run: python3 plugins/obsidian-knowledge/scripts/validate_links.py examples/output

      - name: Adversarial tests — wikilink validator
        run: python3 scripts/test_validators.py

      - name: Adversarial tests — plugin hooks
        run: bash scripts/test_hooks.sh

      - name: Shell scripts parse cleanly
        run: |
          for f in install.sh scripts/*.sh plugins/obsidian-knowledge/scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Skill bundle is in sync with sources
        run: |
          bash scripts/sync-skill.sh
          # Use porcelain (not `git diff --quiet`) so NEW untracked bundle files —
          # e.g. a reference for a freshly added .agents/*.md — also fail the check.
          if [ -n "$(git status --porcelain -- plugins/obsidian-knowledge/skills/obsidian-knowledge)" ]; then
            echo "::error::Skill bundle is out of sync. Run scripts/sync-skill.sh and commit."
            git --no-pager status --porcelain -- plugins/obsidian-knowledge/skills/obsidian-knowledge
            git --no-pager diff -- plugins/obsidian-knowledge/skills/obsidian-knowledge
            exit 1
          fi
